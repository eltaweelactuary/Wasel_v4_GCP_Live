<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0'>
    <title>Wasel v4 Pro Live Fast</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        #c { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #top { position: absolute; top: 0; left: 0; right: 0; padding: 18px 28px; background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 100%); z-index: 10; }
        #brand { color: #666; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; }
        #txt { color: #00ff88; font-size: 38px; font-weight: 700; margin-top: 6px; text-shadow: 0 2px 20px rgba(0,255,136,0.4); min-height: 55px; transition: all .3s; }
        #bot { position: absolute; bottom: 16px; right: 24px; color: #444; font-size: 12px; z-index: 10; font-family: monospace; }
        #cv { display: none; }
    </style>
</head>
<body>
    <div id='c'>
        <video id='v' autoplay playsinline muted></video>
        <div id='top'>
            <div id='brand'>WASEL v4 PRO — GCP LIVE (FAST)</div>
            <div id='txt'>Starting camera...</div>
        </div>
        <div id='bot'>Engine Offline</div>
    </div>
    <canvas id='cv'></canvas>

    <script>
        const v = document.getElementById('v'), 
              cv = document.getElementById('cv'),
              cx = cv.getContext('2d'), 
              tx = document.getElementById('txt'),
              bt = document.getElementById('bot');
        
        let busy = false;
        let lastFrameTime = 0;

        // Resolution reduced further to 320x240 to prioritize extreme speed
        const WIDTH = 320, HEIGHT = 240;
        
        navigator.mediaDevices.getUserMedia({video: {width: 640, height: 480, facingMode: 'user'}})
            .then(s => {
                v.srcObject = s;
                tx.textContent = 'أشر بيدك للحوار...';
                tx.style.color = '#555';
                
                // Process frames frequently, but backend limits to 1 pending request
                setInterval(go, 500);
            })
            .catch(e => {
                tx.textContent = 'Camera Err: ' + e.message;
            });

        function hasMotion(imageData) {
            // Simplified motion detection to save bandwidth if deaf person is fully still
            return true; // Simplified for POC speed
        }

        async function go() {
            if (busy) return;
            busy = true;
            
            cv.width = WIDTH;
            cv.height = HEIGHT;
            
            // Draw scaled-down flipped image
            cx.save();
            cx.scale(-1, 1);
            cx.drawImage(v, -WIDTH, 0, WIDTH, HEIGHT);
            cx.restore();
            
            // EXTREME COMPRESSION: WebP at 0.3 quality ~ 8KB to 12KB max
            const dataUrl = cv.toDataURL('image/webp', 0.3);
            
            bt.textContent = '⚡ Sending...';
            const startTime = performance.now();

            try {
                const response = await fetch('/translate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ image: dataUrl }) // Single image
                });

                if (response.status === 204) {
                    // No gesture
                    if (tx.textContent !== 'أشر بيدك للحوار...') {
                        tx.textContent = 'أشر بيدك للحوار...';
                        tx.style.color = '#555';
                    }
                    bt.textContent = '⚡ Idle';
                } else if (response.status === 200) {
                    const data = await response.json();
                    const t = data.translation;
                    tx.textContent = t;
                    tx.style.color = '#00ff88';
                    const latency = Math.round(performance.now() - startTime);
                    const serverMs = data.processing_time_ms;
                    bt.textContent = `⚡ GCP + Gemini: ${t.split(' ').length}w | RTT: ${latency}ms | Server: ${serverMs}ms`;
                } else {
                    bt.textContent = `Err: HTTP ${response.status}`;
                }
            } catch (err) {
                bt.textContent = 'Err: Network';
                console.error(err);
            } finally {
                busy = false; // Release lock for next frame
            }
        }
    </script>
</body>
</html>
